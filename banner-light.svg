<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420">
  <defs>
    <radialGradient id="g1L" cx="12%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#7C6BFF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FAFAFB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2L" cx="88%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FAFAFB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3L" cx="65%" cy="15%" r="30%">
      <stop offset="0%" stop-color="#4AF0C0" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FAFAFB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameGradL" x1="0%" y1="0%" x2="100%" y2="30%">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="55%" stop-color="#1C1E26"/>
      <stop offset="100%" stop-color="#6B7085"/>
    </linearGradient>
    <linearGradient id="dotGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C6BFF"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <pattern id="gridL" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#0A0A0F" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <filter id="softL" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1280" height="420" fill="#FAFAFB"/>
  <rect width="1280" height="420" fill="url(#gridL)"/>
  <rect width="1280" height="420" fill="url(#g1L)"/>
  <rect width="1280" height="420" fill="url(#g2L)"/>
  <rect width="1280" height="420" fill="url(#g3L)"/>

  <circle cx="960" cy="120" r="180" fill="#7C6BFF" opacity="0.05" filter="url(#softL)"/>
  <circle cx="200" cy="340" r="140" fill="#14B8A6" opacity="0.04" filter="url(#softL)"/>

  <line x1="0" y1="419.5" x2="1280" y2="419.5" stroke="#0A0A0F" stroke-opacity="0.1"/>

  <g transform="translate(96, 132)">
    <circle cx="0" cy="0" r="5" fill="url(#dotGradL)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="5" fill="none" stroke="#7C6BFF" stroke-opacity="0.5">
      <animate attributeName="r" values="5;14;5" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.5;0;0.5" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="22" y="5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" font-weight="500" fill="#6B7085" letter-spacing="3.5">AVAILABLE &#8201;&#8212;&#8201; SOFTWARE ENGINEER &#8201;&#8212;&#8201; SANTA CLARA, CA</text>
  </g>

  <text x="96" y="248" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="96" font-weight="600" fill="url(#nameGradL)" letter-spacing="-4.5">Sai Asish Yamani</text>

  <g font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="400" letter-spacing="-0.3">
    <text x="96" y="296" fill="#2C2F3A">I build systems that shouldn't break.</text>
    <text x="96" y="326" fill="#6B7085">Low-latency infrastructure, partitioned storage, real-time pipelines.</text>
  </g>

  <g transform="translate(96, 376)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="500" letter-spacing="1.8" fill="#8B8F9E">
    <text x="0" y="0">C++</text>
    <text x="44" y="0" fill="#CBD0DA">·</text>
    <text x="60" y="0">GO</text>
    <text x="100" y="0" fill="#CBD0DA">·</text>
    <text x="116" y="0">RUST</text>
    <text x="172" y="0" fill="#CBD0DA">·</text>
    <text x="188" y="0">PYTHON</text>
    <text x="264" y="0" fill="#CBD0DA">·</text>
    <text x="280" y="0">TYPESCRIPT</text>
    <text x="388" y="0" fill="#CBD0DA">·</text>
    <text x="404" y="0">POSTGRES</text>
    <text x="500" y="0" fill="#CBD0DA">·</text>
    <text x="516" y="0">KAFKA</text>
    <text x="580" y="0" fill="#CBD0DA">·</text>
    <text x="596" y="0">KUBERNETES</text>
    <text x="716" y="0" fill="#CBD0DA">·</text>
    <text x="732" y="0">AWS</text>
    <text x="778" y="0" fill="#CBD0DA">·</text>
    <text x="794" y="0">GCP</text>
  </g>
</svg>
