<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1040" width="1280" height="1040">
  <defs>
    <linearGradient id="rowFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="1040" fill="#000000"/>

  <text x="640" y="120" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif"
        font-size="14" font-weight="500" fill="#86868B" letter-spacing="3">SELECTED WORK</text>

  <text x="640" y="200" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="64" font-weight="600" fill="#FFFFFF" letter-spacing="-2.4">Eleven things I built.</text>

  <text x="640" y="252" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="22" font-weight="400" fill="#A1A1A6" letter-spacing="-0.3">Each one started with a problem worth solving.</text>

  <line x1="320" y1="320" x2="960" y2="320" stroke="url(#rowFade)" stroke-width="1"/>

  <!-- 11 project rows, 60px tall, generous spacing -->

  <g transform="translate(0, 380)">
    <text x="200" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" letter-spacing="-0.8">Netlat-Analyser</text>
    <text x="1080" y="0" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="400" fill="#86868B" letter-spacing="-0.2">TCP latency &amp; retransmit anomalies, from pcap.</text>
    <line x1="200" y1="20" x2="1080" y2="20" stroke="#1F1F1F"/>
  </g>

  <g transform="translate(0, 440)">
    <text x="200" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" letter-spacing="-0.8">Sigma Terminal</text>
    <text x="1080" y="0" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="400" fill="#86868B" letter-spacing="-0.2">A Bloomberg-style terminal in the browser.</text>
    <line x1="200" y1="20" x2="1080" y2="20" stroke="#1F1F1F"/>
  </g>

  <g transform="translate(0, 500)">
    <text x="200" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" letter-spacing="-0.8">QUIC CDN Simulator</text>
    <text x="1080" y="0" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="400" fill="#86868B" letter-spacing="-0.2">HTTP/3 vs HTTP/2, settled in code.</text>
    <line x1="200" y1="20" x2="1080" y2="20" stroke="#1F1F1F"/>
  </g>

  <g transform="translate(0, 560)">
    <text x="200" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" letter-spacing="-0.8">Sentinel</text>
    <text x="1080" y="0" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="400" fill="#86868B" letter-spacing="-0.2">Catches secrets and CVEs before they ship.</text>
    <line x1="200" y1="20" x2="1080" y2="20" stroke="#1F1F1F"/>
  </g>

  <g transform="translate(0, 620)">
    <text x="200" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" letter-spacing="-0.8">Cubit Streaming</text>
    <text x="1080" y="0" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="400" fill="#86868B" letter-spacing="-0.2">Low-latency video for biomedical microscopes.</text>
    <line x1="200" y1="20" x2="1080" y2="20" stroke="#1F1F1F"/>
  </g>

  <g transform="translate(0, 680)">
    <text x="200" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" letter-spacing="-0.8">agentlab</text>
    <text x="1080" y="0" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="400" fill="#86868B" letter-spacing="-0.2">A multi-model agent evaluation harness.</text>
    <line x1="200" y1="20" x2="1080" y2="20" stroke="#1F1F1F"/>
  </g>

  <g transform="translate(0, 740)">
    <text x="200" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" letter-spacing="-0.8">context-surgeon</text>
    <text x="1080" y="0" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="400" fill="#86868B" letter-spacing="-0.2">See exactly what an LLM is reading.</text>
    <line x1="200" y1="20" x2="1080" y2="20" stroke="#1F1F1F"/>
  </g>

  <g transform="translate(0, 800)">
    <text x="200" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" letter-spacing="-0.8">pluginforge</text>
    <text x="1080" y="0" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="400" fill="#86868B" letter-spacing="-0.2">A sandbox where untrusted plugins can run safely.</text>
    <line x1="200" y1="20" x2="1080" y2="20" stroke="#1F1F1F"/>
  </g>

  <g transform="translate(0, 860)">
    <text x="200" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" letter-spacing="-0.8">canvaslive</text>
    <text x="1080" y="0" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="400" fill="#86868B" letter-spacing="-0.2">A whiteboard that doesn't fight you when others draw.</text>
    <line x1="200" y1="20" x2="1080" y2="20" stroke="#1F1F1F"/>
  </g>

  <g transform="translate(0, 920)">
    <text x="200" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" letter-spacing="-0.8">JobApplier</text>
    <text x="1080" y="0" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="400" fill="#86868B" letter-spacing="-0.2">An assistant that actually applies for jobs.</text>
    <line x1="200" y1="20" x2="1080" y2="20" stroke="#1F1F1F"/>
  </g>

  <g transform="translate(0, 980)">
    <text x="200" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" letter-spacing="-0.8">Portfolio</text>
    <text x="1080" y="0" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="400" fill="#86868B" letter-spacing="-0.2">Hand-written. No framework. Just type.</text>
  </g>
</svg>
