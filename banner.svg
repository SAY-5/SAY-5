<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360">
  <defs>
    <radialGradient id="glow1" cx="15%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#7C6BFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#08090C" stop-opacity="0"/>
