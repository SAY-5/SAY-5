<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <radialGradient id="heroGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1A1A1A" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameGrad" x1="0%" y1="20%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="80%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#737373"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="#000000"/>
  <rect width="1280" height="640" fill="url(#heroGlow)"/>

  <text x="640" y="240" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="20" font-weight="500" fill="#86868B" letter-spacing="0.4">Software Engineer</text>

  <text x="640" y="360" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="120" font-weight="600" fill="url(#nameGrad)" letter-spacing="-5">Sai Asish Yamani.</text>

  <text x="640" y="430" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="32" font-weight="400" fill="#A1A1A6" letter-spacing="-0.6">Distributed systems. Low-latency infrastructure. Databases.</text>

  <g transform="translate(640, 540)" text-anchor="middle">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="400" fill="#FFFFFF" letter-spacing="-0.2">Available for work &#8250;</text>
  </g>
</svg>
