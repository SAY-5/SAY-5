<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340">
  <defs>
    <linearGradient id="numGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#7C6BFF"/>
    </linearGradient>
    <linearGradient id="numGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#4AF0C0"/>
    </linearGradient>
    <linearGradient id="numGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="numGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0A04A"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A1D28" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#08090C" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#FFFFFF" fill-opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="1280" height="340" fill="#08090C"/>
  <rect width="1280" height="340" fill="url(#dots)"/>
  <rect width="1280" height="340" fill="url(#bgGlow)"/>

  <line x1="0" y1="0.5" x2="1280" y2="0.5" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <line x1="0" y1="339.5" x2="1280" y2="339.5" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <g transform="translate(96, 60)">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="500" fill="#6B7085" letter-spacing="3.5">&#8212;&#8201;&#8201;&#8201;BY THE NUMBERS</text>
    <text x="0" y="28" font-family="ui-sans-serif, -apple-system, 'Inter', 'Segoe UI', sans-serif" font-size="24" font-weight="600" fill="#E8EAED" letter-spacing="-0.8">Selected results from SpatialPathDB</text>
  </g>

  <g font-family="ui-sans-serif, -apple-system, 'Inter', 'Segoe UI', sans-serif">
    <g transform="translate(96, 176)">
      <text x="0" y="0" font-size="104" font-weight="600" fill="url(#numGrad1)" letter-spacing="-5">2.5<tspan font-size="60" dx="-6" dy="-4" font-weight="500" fill="#7C6BFF">×</tspan></text>
      <text x="0" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" font-weight="500" fill="#6B7085" letter-spacing="2.5">VIEWPORT LATENCY WIN</text>
      <text x="0" y="62" font-size="13" font-weight="400" fill="#8B8F9E" letter-spacing="-0.2">Partitioned Postgres vs. monolithic.</text>
    </g>

    <line x1="360" y1="120" x2="360" y2="280" stroke="#FFFFFF" stroke-opacity="0.06"/>

    <g transform="translate(400, 176)">
      <text x="0" y="0" font-size="104" font-weight="600" fill="url(#numGrad2)" letter-spacing="-5">9.1<tspan font-size="60" dx="-6" dy="-4" font-weight="500" fill="#4AF0C0">×</tspan></text>
      <text x="0" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" font-weight="500" fill="#6B7085" letter-spacing="2.5">COLD-CACHE SPEEDUP</text>
      <text x="0" y="62" font-size="13" font-weight="400" fill="#8B8F9E" letter-spacing="-0.2">53 ms vs. 486 ms at first touch.</text>
    </g>

    <line x1="664" y1="120" x2="664" y2="280" stroke="#FFFFFF" stroke-opacity="0.06"/>

    <g transform="translate(704, 176)">
      <text x="0" y="0" font-size="104" font-weight="600" fill="url(#numGrad3)" letter-spacing="-5">42<tspan font-size="60" dx="-2" dy="-4" font-weight="500" fill="#2563EB">M</tspan></text>
      <text x="0" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" font-weight="500" fill="#6B7085" letter-spacing="2.5">NUCLEI INDEXED</text>
      <text x="0" y="62" font-size="13" font-weight="400" fill="#8B8F9E" letter-spacing="-0.2">Across 29 TCGA pathology slides.</text>
    </g>

    <line x1="920" y1="120" x2="920" y2="280" stroke="#FFFFFF" stroke-opacity="0.06"/>

    <g transform="translate(960, 176)">
      <text x="0" y="0" font-size="104" font-weight="600" fill="url(#numGrad4)" letter-spacing="-5">89<tspan font-size="60" dx="-2" dy="-4" font-weight="500" fill="#F0A04A">%</tspan></text>
      <text x="0" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" font-weight="500" fill="#6B7085" letter-spacing="2.5">PARTITIONS PRUNED</text>
      <text x="0" y="62" font-size="13" font-weight="400" fill="#8B8F9E" letter-spacing="-0.2">5.7 of 59 sub-partitions touched.</text>
    </g>
  </g>
</svg>
