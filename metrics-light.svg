<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340">
  <defs>
    <linearGradient id="numGrad1L" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#7C6BFF"/>
    </linearGradient>
    <linearGradient id="numGrad2L" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="numGrad3L" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="numGrad4L" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#EA8A3A"/>
    </linearGradient>
    <pattern id="dotsL" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#0A0A0F" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1280" height="340" fill="#FAFAFB"/>
  <rect width="1280" height="340" fill="url(#dotsL)"/>

  <line x1="0" y1="0.5" x2="1280" y2="0.5" stroke="#0A0A0F" stroke-opacity="0.1"/>
  <line x1="0" y1="339.5" x2="1280" y2="339.5" stroke="#0A0A0F" stroke-opacity="0.1"/>

  <g transform="translate(96, 60)">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="500" fill="#8B8F9E" letter-spacing="3.5">&#8212;&#8201;&#8201;&#8201;BY THE NUMBERS</text>
    <text x="0" y="28" font-family="ui-sans-serif, -apple-system, 'Inter', 'Segoe UI', sans-serif" font-size="24" font-weight="600" fill="#0A0A0F" letter-spacing="-0.8">Selected results from SpatialPathDB</text>
  </g>

  <g font-family="ui-sans-serif, -apple-system, 'Inter', 'Segoe UI', sans-serif">
    <g transform="translate(96, 176)">
      <text x="0" y="0" font-size="104" font-weight="600" fill="url(#numGrad1L)" letter-spacing="-5">2.5<tspan font-size="60" dx="-6" dy="-4" font-weight="500" fill="#7C6BFF">×</tspan></text>
      <text x="0" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" font-weight="500" fill="#8B8F9E" letter-spacing="2.5">VIEWPORT LATENCY WIN</text>
      <text x="0" y="62" font-size="13" font-weight="400" fill="#4A4E5A" letter-spacing="-0.2">Partitioned Postgres vs. monolithic.</text>
    </g>

    <line x1="360" y1="120" x2="360" y2="280" stroke="#0A0A0F" stroke-opacity="0.08"/>

    <g transform="translate(400, 176)">
      <text x="0" y="0" font-size="104" font-weight="600" fill="url(#numGrad2L)" letter-spacing="-5">9.1<tspan font-size="60" dx="-6" dy="-4" font-weight="500" fill="#14B8A6">×</tspan></text>
      <text x="0" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" font-weight="500" fill="#8B8F9E" letter-spacing="2.5">COLD-CACHE SPEEDUP</text>
      <text x="0" y="62" font-size="13" font-weight="400" fill="#4A4E5A" letter-spacing="-0.2">53 ms vs. 486 ms at first touch.</text>
    </g>

    <line x1="664" y1="120" x2="664" y2="280" stroke="#0A0A0F" stroke-opacity="0.08"/>

    <g transform="translate(704, 176)">
      <text x="0" y="0" font-size="104" font-weight="600" fill="url(#numGrad3L)" letter-spacing="-5">42<tspan font-size="60" dx="-2" dy="-4" font-weight="500" fill="#2563EB">M</tspan></text>
      <text x="0" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" font-weight="500" fill="#8B8F9E" letter-spacing="2.5">NUCLEI INDEXED</text>
      <text x="0" y="62" font-size="13" font-weight="400" fill="#4A4E5A" letter-spacing="-0.2">Across 29 TCGA pathology slides.</text>
    </g>

    <line x1="920" y1="120" x2="920" y2="280" stroke="#0A0A0F" stroke-opacity="0.08"/>

    <g transform="translate(960, 176)">
      <text x="0" y="0" font-size="104" font-weight="600" fill="url(#numGrad4L)" letter-spacing="-5">89<tspan font-size="60" dx="-2" dy="-4" font-weight="500" fill="#EA8A3A">%</tspan></text>
      <text x="0" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" font-weight="500" fill="#8B8F9E" letter-spacing="2.5">PARTITIONS PRUNED</text>
      <text x="0" y="62" font-size="13" font-weight="400" fill="#4A4E5A" letter-spacing="-0.2">5.7 of 59 sub-partitions touched.</text>
